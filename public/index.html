<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AJRM Marine Instrument Alerts</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">Signal K monitoring</p>
          <h1>AJRM Marine Instrument Alerts</h1>
          <p class="lede">Calm announcements when values cross limits or change too quickly.</p>
        </div>
        <div class="connection"><span id="statusDot"></span><span id="statusText">Connecting</span></div>
      </header>

      <section class="toolbar">
        <label class="master"><input id="enabled" type="checkbox" /> Enable monitoring</label>
        <div class="actions">
          <button id="addMonitor" type="button" class="secondary">Add instrument</button>
          <button id="saveSettings" type="button">Save and apply</button>
        </div>
        <p id="settingsMessage" class="message"></p>
      </section>

      <section id="monitors" class="monitor-list"></section>

      <section class="recent">
        <h2>Recent announcements</h2>
        <div id="recentEvents" class="event-list"><p>None yet.</p></div>
      </section>
    </main>

    <template id="monitorTemplate">
      <article class="monitor-card">
        <div class="monitor-heading">
          <label class="enabled-row"><input data-field="enabled" type="checkbox" /> Monitor</label>
          <span class="active-state">Normal</span>
          <button data-action="remove" type="button" class="danger-button">Remove</button>
        </div>
        <div class="fields identity-fields">
          <label>Label<input data-field="label" type="text" /></label>
          <label>Signal K path<input data-field="path" type="text" spellcheck="false" /></label>
          <label>Unit<input data-field="unit" type="text" /></label>
          <label>Conversion
            <select data-field="conversion">
              <option value="none">No conversion</option>
              <option value="kelvinToCelsius">Kelvin to Celsius</option>
              <option value="metersPerSecondToKnots">m/s to knots</option>
              <option value="radiansToDegrees">Radians to degrees</option>
            </select>
          </label>
        </div>
        <div class="live-reading">
          <strong class="live-value">--</strong>
          <span class="live-rate">Rate --</span>
          <span class="live-updated"></span>
        </div>
        <div class="fields tuning-fields">
          <label>Rate window (s)<input data-field="rateWindowSeconds" type="number" min="10" max="3600" /></label>
          <label>Minimum rate sample (s)<input data-field="minimumRateSampleSeconds" type="number" min="1" max="600" /></label>
          <label>Value hysteresis<input data-field="hysteresis" type="number" min="0" step="0.1" /></label>
          <label>Rate hysteresis/min<input data-field="rateHysteresisPerMinute" type="number" min="0" step="0.1" /></label>
        </div>
        <div class="rule-table">
          <div class="rule-row rule-header">
            <span>Level</span><span>Below</span><span>Above</span><span>Rise/min</span><span>Fall/min</span><span>Repeat</span>
          </div>
          <div class="rule-row" data-level="information">
            <label class="level information"><input data-rule="enabled" type="checkbox" /> Information</label>
            <input data-rule="minimum" type="number" step="any" placeholder="off" />
            <input data-rule="maximum" type="number" step="any" placeholder="off" />
            <input data-rule="risePerMinute" type="number" min="0" step="any" placeholder="off" />
            <input data-rule="fallPerMinute" type="number" min="0" step="any" placeholder="off" />
            <label class="repeat"><input data-rule="repeatSeconds" type="number" min="1" /> <span>s</span></label>
          </div>
          <div class="rule-row" data-level="warning">
            <label class="level warning"><input data-rule="enabled" type="checkbox" /> Warning</label>
            <input data-rule="minimum" type="number" step="any" placeholder="off" />
            <input data-rule="maximum" type="number" step="any" placeholder="off" />
            <input data-rule="risePerMinute" type="number" min="0" step="any" placeholder="off" />
            <input data-rule="fallPerMinute" type="number" min="0" step="any" placeholder="off" />
            <label class="repeat"><input data-rule="repeatSeconds" type="number" min="1" /> <span>s</span></label>
          </div>
          <div class="rule-row" data-level="danger">
            <label class="level danger"><input data-rule="enabled" type="checkbox" /> Danger</label>
            <input data-rule="minimum" type="number" step="any" placeholder="off" />
            <input data-rule="maximum" type="number" step="any" placeholder="off" />
            <input data-rule="risePerMinute" type="number" min="0" step="any" placeholder="off" />
            <input data-rule="fallPerMinute" type="number" min="0" step="any" placeholder="off" />
            <label class="repeat"><input data-rule="repeatSeconds" type="number" min="1" /> <span>s</span></label>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
